apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: ticketing
spec:
  type: NodePort
  selector:
    app: reservation-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: grpc
      port: 9090
      targetPort: 9090
      nodePort: 30090