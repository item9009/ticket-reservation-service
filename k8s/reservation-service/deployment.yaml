apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: ticketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
        - name: reservation-service
          image: reservation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9090       # gRPC
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ticketing-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketing-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ticketing-secret
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: ticketing-config
                  key: REDIS_HOST
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: ticketing-config
                  key: KAFKA_SERVERS
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-service:3306/ticketing?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30