// event_seat.proto
syntax = "proto3";

package ticketing;

option java_package = "com.ticketing.grpc";
option java_outer_classname = "EventSeatProto";
option java_multiple_files = true;

service EventSeatService {
  rpc ValidateAndGetSeats (ValidateSeatRequest) returns (ValidateSeatResponse);
}

message ValidateSeatRequest {
  int64 event_id = 1;
  repeated int64 event_seat_ids = 2;
}

message ValidateSeatResponse {
  repeated SeatInfo seats = 1;
}

message SeatInfo {
  int64 event_seat_id = 1;
  int32 price = 2;
  string status = 3;
}